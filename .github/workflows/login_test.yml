name: ログイン疎通テスト（手動）

# 直接ログイン(ID/PASS→店舗選択→売上ページ到達)を Firestore 不使用で検証する。
# クォータ超過中でも実行可能。結果スクショを artifact に保存。

on:
  workflow_dispatch:

jobs:
  login-test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true
      - name: Test direct login
        env:
          HEADLESS: 'true'
          LOGIN_MODE: 'direct'
          AIRREGI_ID: ${{ secrets.AIRREGI_ID }}
          AIRREGI_PASS: ${{ secrets.AIRREGI_PASS }}
          AIRREGI_STORE_NAME: 'CANVAS COFFEE'
        run: python src/login_test.py
      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-test
          path: |
            downloads/login_test_ok.png
            downloads/login_test_fail.png
            downloads/login_test_captcha.png
          if-no-files-found: ignore
          retention-days: 3
