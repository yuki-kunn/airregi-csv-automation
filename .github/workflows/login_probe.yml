name: ログインページ調査（一時・手動）

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true
      - name: Probe login page
        env:
          HEADLESS: 'true'
        run: python src/login_probe.py
      - name: Upload login page artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: login-page
          path: |
            downloads/login_page.html
            downloads/login_page.png
          if-no-files-found: ignore
          retention-days: 3
