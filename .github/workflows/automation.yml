name: AirREGI CSV 自動取込・アップロード

on:
  # 10分毎に起動し、Firestoreの scheduledTime と一致したときだけ実行する
  # (cron は UTC。10分間隔なので時刻に関係なく回す)
  schedule:
    - cron: '*/10 * * * *'
  # admin画面の「今すぐ実行」や手動確認用
  workflow_dispatch:
    inputs:
      run_date:
        description: '対象日 (YYYY-MM-DD)。空なら当日'
        required: false
        default: ''
      force_run:
        description: '強制実行 (true/false)'
        required: false
        default: 'true'

# 同時実行を防止（前回がまだ動いていたらスキップ）
concurrency:
  group: airregi-automation
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ubuntu-latest には Chrome が同梱されているが、明示的にセットアップして
      # chromedriver のバージョン整合を保証する
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
          install-chromedriver: true

      - name: Set forceRun / runDate (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        env:
          FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          DISPATCH_FORCE_RUN: ${{ github.event.inputs.force_run }}
          DISPATCH_RUN_DATE: ${{ github.event.inputs.run_date }}
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, 'src')
          import firestore_client as fs
          updates = {}
          if os.environ.get('DISPATCH_FORCE_RUN', '').lower() == 'true':
              updates['forceRun'] = True
          run_date = os.environ.get('DISPATCH_RUN_DATE', '').strip()
          if run_date:
              updates['runDate'] = run_date
          if updates:
              fs.update_config(updates)
              print(f"Firestoreを更新しました: {updates}")
          EOF

      - name: Run automation
        env:
          HEADLESS: 'true'
          FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_ADMIN_SERVICE_ACCOUNT_KEY }}
          FIREBASE_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_ADMIN_PROJECT_ID }}
          IPO_UPLOAD_PASSWORD: ${{ secrets.IPO_UPLOAD_PASSWORD }}
          SCHEDULE_WINDOW_MINUTES: '10'
          # ログイン: 直接ログイン優先、失敗時はCookieにフォールバック
          LOGIN_MODE: 'auto'
          AIRREGI_ID: ${{ secrets.AIRREGI_ID }}
          AIRREGI_PASS: ${{ secrets.AIRREGI_PASS }}
          AIRREGI_COOKIES: ${{ secrets.AIRREGI_COOKIES }}
        run: python src/run.py

      # 失敗時の診断ファイル（debug_page.html / .png）を回収
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-page
          path: |
            downloads/debug_page.html
            downloads/debug_page.png
            downloads/debug_calendar.html
          if-no-files-found: ignore
          retention-days: 3
